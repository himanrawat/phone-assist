pricing_and_packaging:
  domain_definition: >-
    Pricing and packaging concepts should be modeled as retrievable metadata rather than hard-coded truth
    in behavior training, because plan details can change.
  entities:
    Plan:
      definition: Commercial plan or tier offered to a user or organization.
      attributes:
        - plan_id
        - plan_name
        - audience
        - billing_model
        - user_limit
        - feature_entitlements
        - ai_entitlements
        - support_level
      subclasses:
        - IndividualPlan
        - ProfessionalPlan
        - BusinessPlan
        - EnterprisePlan
        - CustomPlan
    Entitlement:
      definition: Capability or limit granted by a plan.
      subclasses:
        - ModuleEntitlement
        - AIFeatureEntitlement
        - UserLimitEntitlement
        - StorageEntitlement
        - SupportEntitlement
  pricing_dimensions:
    billing_models:
      - monthly
      - annual
      - quote_based
      - custom_contract
    packaging_dimensions:
      - seat_based
      - organization_based
      - usage_based
      - ai_usage_gated
      - feature_gated
  guidance:
    - Treat exact prices as retrieval data.
    - Treat entitlement categories as ontology data.
    - Separate collaboration entitlements from AI entitlements.

trust_security_and_compliance:
  trust_principles:
    - enterprise_security
    - access_control
    - identity_flexibility
    - data_handling_clarity
    - operational_control
  security_entities:
    - access_policy
    - permission_set
    - admin_control
    - audit_event
  compliance_modeling_guidance:
    - store compliance labels as metadata, not marketing claims
    - only assert certifications that are source-backed

