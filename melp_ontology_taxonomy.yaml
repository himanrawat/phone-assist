meta:
  name: Melp Ontology and Taxonomy
  version: 1.0.0
  purpose: >-
    Canonical ontology and taxonomy for MelpApp to support dataset design,
    retrieval indexing, intent routing, feature grounding, and structured output generation.
  scope:
    includes:
      - product ontology
      - domain entities
      - module taxonomy
      - AI capability taxonomy
      - intent taxonomy
      - workflow taxonomy
      - content taxonomy
      - identity and organization model
      - pricing and packaging concepts
      - trust, security, and compliance concepts
      - output schemas and controlled vocabularies
    excludes:
      - implementation-specific API contracts
      - volatile release-note details
      - vendor pricing numbers that may change
  design_principles:
    - Prefer stable concepts over marketing copy.
    - Separate product facts from positioning claims.
    - Keep entities machine-readable and composable.
    - Use controlled vocabularies where routing or analytics matters.
    - Treat AI features as workflow-embedded capabilities, not standalone products.

product:
  id: product_melp
  name: MelpApp
  aliases:
    - Melp
    - MELP
    - Melp App
    - melp app
  category:
    primary: intelligent_workspace
    secondary:
      - collaboration_platform
      - cross_organization_collaboration_platform
      - communication_and_workflow_platform
  positioning:
    core_definition: >-
      MelpApp is a cross-organization intelligent workspace that unifies messaging,
      meetings, files, calendar coordination, and embedded AI workflows.
    category_statement: >-
      Melp is best described as a cross-organization intelligent workspace rather than
      a single-organization chat or meeting tool.
    differentiation_axes:
      - cross_organization_first
      - reduced_vendor_lock_in
      - native_identity_support
      - embedded_ai_in_workflows
      - unified_communication_and_document_intelligence
  value_propositions:
    - Coordinate work across organizational boundaries.
    - Communicate through messaging, calls, and meetings in one system.
    - Centralize file access through Melp Drive and external drive integrations.
    - Turn files, meetings, and conversations into summaries, translations, and drafts.
    - Support multilingual collaboration through translation and transcription features.
  anti_positioning:
    - not_just_a_chat_app
    - not_just_a_video_meeting_tool
    - not_dependent_on_google_or_microsoft_identity
    - not_ai_hype_first

identity_model:
  model_id: identity_model_melp
  principles:
    - native_identity_supported
    - external_identity_optional
    - organization_boundary_is_soft_for_collaboration
    - users_may_interact_across_orgs
  identity_types:
    - native_melp_identity
    - google_identity
    - microsoft_identity
  authentication_concepts:
    - user_account
    - login_method
    - session
    - access_control
    - admin_role
    - member_role
    - guest_or_external_participant
  vendor_lock_in:
    level: reduced
    explanation: >-
      Google and Microsoft identity can be used as conveniences, but they are not mandatory
      dependencies for collaboration in Melp.

ontology:
  top_level_domains:
    - product
    - identity_and_access
    - organizations_and_network
    - communication
    - meetings
    - content_and_files
    - calendar_and_coordination
    - ai_capabilities
    - workflows_and_automation
    - pricing_and_packaging
    - trust_security_and_compliance
    - analytics_and_observability

entities:
  actor_entities:
    User:
      id_pattern: user_*
      definition: Human account holder using Melp.
      attributes:
        stable:
          - user_id
          - display_name
          - primary_identity_type
          - preferred_language
          - timezone
        relational:
          - belongs_to_organizations
          - participates_in_conversations
          - attends_meetings
          - owns_or_accesses_files
          - has_network_connections
          - has_roles
      subclasses:
        - InternalUser
        - ExternalUser
        - AdminUser
        - GuestUser
        - Interviewer
        - Candidate
    Organization:
      id_pattern: org_*
      definition: Logical organization or company context inside Melp.
      attributes:
        - organization_id
        - organization_name
        - organization_type
        - domain_association
        - member_count
        - policy_set
      subclasses:
        - Company
        - Team
        - Department
        - PartnerOrganization
        - ClientOrganization
        - VendorOrganization
        - CommunityOrGroup
    Team:
      id_pattern: team_*
      definition: Collaborative subgroup inside an organization.
      attributes:
        - team_id
        - team_name
        - organization_id
        - members
        - topics
    Role:
      id_pattern: role_*
      definition: Access or responsibility type assigned to a user.
      controlled_values:
        - admin
        - manager
        - member
        - external_collaborator
        - interviewer
        - candidate
        - viewer
        - editor

  communication_entities:
    Conversation:
      id_pattern: conv_*
      definition: Persistent communication thread.
      attributes:
        - conversation_id
        - conversation_type
        - participants
        - messages
        - topic
        - language_profile
      subclasses:
        - DirectMessage
        - GroupChat
        - TeamTopic
        - AnnouncementThread
    Message:
      id_pattern: msg_*
      definition: Unit of written communication inside a conversation.
      attributes:
        - message_id
        - sender_id
        - conversation_id
        - timestamp
        - content
        - content_type
        - attachments
        - language
        - draft_origin
      subclasses:
        - TextMessage
        - FileShareMessage
        - SystemMessage
        - DraftedMessage
        - TranslatedMessage
    Topic:
      id_pattern: topic_*
      definition: Named thematic thread under a team or group context.
      examples:
        - Work Report
        - Meeting Details

  meeting_entities:
    Meeting:
      id_pattern: meeting_*
      definition: Scheduled or ad hoc audio or video collaboration session.
      attributes:
        - meeting_id
        - meeting_title
        - meeting_type
        - participants
        - start_time
        - end_time
        - transcript
        - summary
        - action_items
      subclasses:
        - AudioCall
        - VideoCall
        - InterviewSession
        - ClientMeeting
        - InternalMeeting
        - AdHocCall
    Transcript:
      id_pattern: transcript_*
      definition: Text rendering of spoken content from a meeting or call.
      attributes:
        - transcript_id
        - source_meeting_id
        - utterances
        - language_profile
        - timestamps
        - speaker_labels
    Utterance:
      id_pattern: utt_*
      definition: Atomic spoken segment in a transcript.
      attributes:
        - utterance_id
        - speaker
        - text
        - start_timestamp
        - end_timestamp
        - confidence
    ActionItem:
      id_pattern: action_*
      definition: Task inferred or captured from a meeting or document.
      attributes:
        - action_item_id
        - task_text
        - owner
        - due_date
        - status
        - source_reference
      controlled_values:
        status:
          - open
          - in_progress
          - blocked
          - completed
          - unknown
    Decision:
      id_pattern: decision_*
      definition: Explicit decision captured from a meeting or workflow.
    ObservationEvent:
      id_pattern: obs_*
      definition: Behavioral or session event captured during evaluation mode.
      subclasses:
        - EyeGazeDeviationEvent
        - TabSwitchEvent
        - ScreenFocusChangeEvent

  content_entities:
    File:
      id_pattern: file_*
      definition: Stored or linked digital document inside Melp Drive or attached in Melp.
      attributes:
        - file_id
        - file_name
        - mime_type
        - source_system
        - owner
        - language
        - file_size
        - access_permissions
      subclasses:
        - Document
        - Presentation
        - Spreadsheet
        - PDF
        - Image
        - AudioFile
        - VideoFile
    Document:
      id_pattern: doc_*
      definition: Structured file containing readable business content.
      attributes:
        - document_type
        - extracted_text
        - summary
        - translated_versions
      subclasses:
        - Contract
        - Proposal
        - Report
        - Resume
        - JobDescription
        - PolicyDocument
        - Invoice
        - Notes
    FileVersion:
      id_pattern: filever_*
      definition: Versioned variant of a file.
      subclasses:
        - OriginalVersion
        - TranslatedVersion
        - RevisedVersion
        - AnnotatedVersion
    FileReference:
      id_pattern: fileref_*
      definition: Pointer to a file from a conversation, meeting, or drive integration.

  coordination_entities:
    CalendarEvent:
      id_pattern: cal_*
      definition: Scheduled event or appointment.
      subclasses:
        - MeetingEvent
        - Appointment
        - InterviewSlot
        - ReminderEvent
    AvailabilitySlot:
      id_pattern: slot_*
      definition: Time availability window used for scheduling.
    NetworkConnection:
      id_pattern: conn_*
      definition: Relationship between users in Melp's network graph.

  ai_entities:
    AICapability:
      id_pattern: ai_*
      definition: Embedded AI workflow capability available in Melp.
    SummaryArtifact:
      id_pattern: summary_*
      definition: AI-generated summary grounded in a source document, transcript, or conversation.
    TranslationArtifact:
      id_pattern: translation_*
      definition: AI-generated translation output for text, file, or speech.
    DraftArtifact:
      id_pattern: draft_*
      definition: AI-generated or AI-rewritten message content.
    QuestionSet:
      id_pattern: qset_*
      definition: AI-generated interview or review question collection.
    QAPair:
      id_pattern: qa_*
      definition: A grounded question-answer pair associated with a document or context.

modules:
  canonical_modules:
    messaging:
      definition: Messaging and thread-based communication within and across organizations.
      primary_entities:
        - Conversation
        - Message
        - Topic
      capabilities:
        - direct_messaging
        - group_chat
        - team_topics
        - file_sharing
        - draft_for_me
        - real_time_translation_in_chat
        - file_summary_from_chat
    meetings:
      definition: Audio/video calling and meeting collaboration.
      primary_entities:
        - Meeting
        - Transcript
        - ActionItem
        - Decision
      capabilities:
        - audio_calls
        - video_calls
        - live_transcription
        - meeting_summary
        - speech_to_speech_translation
        - evaluation_mode
    melp_drive:
      definition: File storage, access, integration, and document intelligence layer.
      primary_entities:
        - File
        - Document
        - FileVersion
        - FileReference
      capabilities:
        - upload_and_access_files
        - integrate_external_drives
        - file_translation
        - file_summary
        - document_qa
        - versioned_translated_outputs
    smart_calendar:
      definition: Scheduling and meeting coordination functionality.
      primary_entities:
        - CalendarEvent
        - AvailabilitySlot
        - Meeting
      capabilities:
        - schedule_meetings
        - arrange_appointments
        - coordinate_availability
    network:
      definition: User and connection graph for inviting and discovering collaborators.
      primary_entities:
        - User
        - NetworkConnection
        - Organization
      capabilities:
        - invite_users
        - view_connections
        - expand_collaboration_network

integrations:
  integration_taxonomy:
    identity_integrations:
