ai_capabilities:
  design_principle: >-
    AI in Melp is workflow-embedded. Capabilities act on messages, meetings, files,
    and evaluation sessions rather than existing as an isolated generic assistant.
  capability_taxonomy:
    language_intelligence:
      definition: AI that translates or transforms language across text, speech, and files.
      capabilities:
        file_translation:
          id: ai_file_translation
          module: melp_drive
          inputs:
            required:
              - source_document
              - target_language
            optional:
              - source_language
              - preserve_formatting
              - tone_preference
          outputs:
            - translated_document
            - translation_status
            - translated_file_reference
          constraints:
            - preserve_meaning
            - do_not_invent_missing_text
            - surface_failures_for_unreadable_content
        chat_translation:
          id: ai_chat_translation
          module: messaging
          inputs:
            required:
              - message_content
              - target_language_or_user_language
          outputs:
            - translated_message_view
          constraints:
            - preserve_message_intent
            - support_multilingual_collaboration
        speech_to_speech_translation:
          id: ai_speech_to_speech_translation
          module: meetings
          inputs:
            required:
              - speech_stream
              - target_language
          outputs:
            - translated_speech_output
            - optional_transcript
          constraints:
            - low_latency_preferred
            - preserve_speaker_intent

    content_understanding:
      definition: AI that summarizes, answers questions, and extracts useful structure from content.
      capabilities:
        file_summary:
          id: ai_file_summary
          module: melp_drive
          inputs:
            required:
              - document
            optional:
              - summary_length
              - output_language
          outputs:
            - summary
            - key_points
            - risks
            - next_steps
          constraints:
            - grounded_in_document
            - no_hallucinated_sections
        document_qa:
          id: ai_document_qa
          module: melp_drive
          inputs:
            required:
              - document
              - question
          outputs:
            - grounded_answer
            - evidence_scope
          constraints:
            - answer_only_from_document_when_requested
            - state_not_found_when_absent
        meeting_summary:
          id: ai_meeting_summary
          module: meetings
          inputs:
            required:
              - transcript_or_meeting_content
            optional:
              - output_language
              - summary_style
          outputs:
            - meeting_overview
            - key_discussion_points
            - decisions
            - action_items
            - open_questions
          constraints:
            - do_not_invent_decisions
            - mark_unknown_owner_if_owner_unclear
        conversation_summary:
          id: ai_conversation_summary
          module: messaging
          inputs:
            required:
              - conversation_context
          outputs:
            - summary
            - pending_items

    audio_intelligence:
      definition: AI that transcribes or structures spoken audio.
      capabilities:
        live_transcription:
          id: ai_live_transcription
          module: meetings
          inputs:
            required:
              - audio_stream
            optional:
              - language_hint
              - speaker_separation
          outputs:
            - transcript_stream
            - timestamps
            - confidence_annotations
          constraints:
            - preserve_order
            - mark_low_confidence_segments
            - do_not_invent_speech

    writing_intelligence:
      definition: AI that rewrites, drafts, or structures user communications.
      capabilities:
        draft_for_me:
          id: ai_draft_for_me
          module: messaging
          inputs:
            required:
              - source_message_or_intent
            optional:
              - tone
              - length
              - audience
              - language
          outputs:
            - draft_text
            - tone_used
            - optional_variants
          constraints:
            - preserve_intended_meaning
            - do_not_add_unrequested_commitments
            - improve_clarity_and_structure

    behavioral_intelligence:
      definition: AI that observes session behavior in evaluation contexts and supports interview workflows.
      capabilities:
        evaluation_mode:
          id: ai_evaluation_mode
          module: meetings
          inputs:
            required:
              - session_context
              - observable_behavior_signals
            optional:
              - camera_signal
              - tab_switch_signal
              - screen_focus_signal
              - job_description
              - candidate_resume
          outputs:
            - observation_report
            - event_timestamps
            - generated_question_set
          constraints:
            - observational_not_psychological
            - no_unsupported_cheating_claims
            - no_discriminatory_conclusions
        interview_question_generation:
          id: ai_interview_question_generation
          module: meetings
          inputs:
            required:
              - job_description
              - candidate_resume
          outputs:
            - tailored_question_set
            - topical_coverage_map
          constraints:
            - align_questions_to_role_requirements
            - align_questions_to_candidate_background

